<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign in — Now or Never</title>
    <style>
        :root{
            /* Now or Never: green + blue palette */
            --bg1:#031426;   /* deep blue */
            --bg2:#052b1f;   /* deep green */
            --card:#0f1724cc;
            --accent:#74a404; /* green */
            --accent2:#1128B3; /* blue */
            --muted:#9aa7bd;
            --glass: rgba(255,255,255,0.04);
            --on-accent:#04203a; /* text color on green */
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        }

        html,body{height:100%;}
        body{
            margin:0;
            background:rgb(255, 255, 255);
            color:#e6eef8;
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
        }

        .container{
            width:100%;
            max-width:980px;
            display:grid;
            grid-template-columns: 1fr 420px;
            gap:32px;
            align-items:center;
        }

        .hero{
            padding:40px;
            border-radius:16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            box-shadow: 0 10px 30px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
            backdrop-filter: blur(6px);
        }

        .brand{
            display:flex;
            gap:14px;
            align-items:center;
            margin-bottom:18px;
        }
        .logo{
            width:56px;
            height:56px;
            border-radius:12px;
            background: linear-gradient(135deg,var(--accent),var(--accent2));
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:700;
            color:#04203a;
            box-shadow: 0 6px 18px rgba(6,46,40,0.45);
            flex-shrink:0;
        }

        h1{margin:0 0 8px 0;font-size:22px;}
        p.lead{margin:0;color:var(--muted);font-size:14px;line-height:1.5;}

        .features{
            display:grid;
            grid-template-columns:repeat(2, minmax(0,1fr));
            gap:12px;
            margin-top:22px;
        }
        .feature{
            display:flex;
            gap:10px;
            align-items:center;
            background:var(--glass);
            padding:10px;
            border-radius:10px;
            font-size:13px;
            color:var(--muted);
        }
        .feature .dot{
            width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--accent);
        }

        /* Card / form */
        .card{
            padding:28px;
            border-radius:14px;
            /* make the card match the green accent and ensure form content is visible */
            background: linear-gradient(135deg, var(--accent) 0%, #74a404 100%);
            /* local palette overrides so buttons inside this card become blue */
            --accent: #1128B3;
            --accent2: #1128B3;
            --on-accent: #ffffff;
            color: var(--on-accent);
            box-shadow: 0 10px 30px rgba(2,6,23,0.35);
            backdrop-filter: blur(6px);
        }

        /* ensure text inside card uses the on-accent color */
        .card h2,
        .card label,
        .card .small,
        .card .muted-link,
        .card .helper,
        .card .row,
        .card p {
            color: var(--on-accent);
        }

        form{display:grid;gap:14px;}
        label{font-size:13px;display:block;margin-bottom:6px;}
        .field{
            display:flex;
            flex-direction:column;
        }
        input[type="email"],
        input[type="password"]{
            appearance:none;
            border:1px solid rgba(4,32,58,0.08);
            background: rgba(255,255,255,0.95);
            color:#000; /* make user input visible and black */
            padding:12px 14px;
            border-radius:10px;
            outline:none;
            font-size:15px;
            transition: border-color .15s, box-shadow .15s;
        }
        input::placeholder{ color: rgba(0,0,0,0.35); }
        input:focus{
            border-color: rgba(4,32,58,0.2);
            box-shadow: 0 6px 20px rgba(4,32,58,0.06);
        }

        .row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            font-size:13px;
        }

        .actions{
            display:flex;
            gap:12px;
            margin-top:6px;
        }

        .btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            padding:11px 14px;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            border:0;
            background: linear-gradient(90deg,var(--accent),var(--accent2));
            color: var(--on-accent);
            box-shadow: 0 8px 24px rgba(16,90,70,0.12);
            transition:transform .08s ease, box-shadow .08s ease, opacity .08s;
            text-decoration:none;
        }
        .btn.secondary{
            background: rgba(255,255,255,0.12);
            color: var(--on-accent);
            border:1px solid rgba(4,32,58,0.06);
        }
        .btn:active{transform:translateY(1px);}

        .small{
            font-size:13px;
        }

        .social{
            display:flex;
            gap:10px;
        }
        .social button{
            flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--muted);cursor:pointer;
        }

        .muted-link{ text-decoration:none; color: rgba(4,32,58,0.95); }
        .muted-link:hover{text-decoration:underline}

        .helper{
            color: rgba(4,32,58,0.9); font-size:13px;margin-top:6px;display:none;
        }

        /* small screens */
        @media (max-width:900px){
            .container{grid-template-columns:1fr;max-width:540px;}
            .hero{order:2}
            .card{order:1}
        }
    </style>
</head>
<body>
    <main role="main" style="width:100%;display:flex;align-items:center;justify-content:center;padding:24px;">
        <section class="card" aria-labelledby="signin-title" style="width:100%;max-width:420px;">
            <h2 id="signin-title" style="margin:0 0 8px 0;font-size:18px;color:inherit">Sign in</h2>
            <p class="small mb-5" style="margin-bottom:14px;color:inherit">Use your account to access thr platform</p>

            <form id="loginForm" novalidate>
                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" autocomplete="email" inputmode="email" placeholder="you@company.com" required>
                    <div class="helper" id="emailHelp">Please enter a valid email address</div>
                </div>

                <div class="field" style="position:relative;">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required minlength="6">
                    <button type="button" id="togglePwd" aria-label="Show password" title="Show password" style="position:absolute;right:10px;top:36px;background:transparent;border:0;color:var(--on-accent);cursor:pointer;font-size:13px;">Show</button>
                    <div class="helper" id="pwdHelp">Passwords must be at least 6 characters</div>
                </div>

                <div class="row" style="margin-top:6px;"></div>
                    <label style="display:flex;align-items:center;gap:8px;font-weight:500;color:var(--on-accent)"></label>
                        <input id="remember" name="remember" type="checkbox" style="width:16px;height:16px;border-radius:4px;margin-right:8px;">
                        <span style="font-weight:600;font-size:13px">Remember me</span>
                    </label>
                    <a class="muted-link" href="#" id="forgot">Forgot password?</a>
                </div>

                <div class="actions" style="margin-top:12px;">
                    <button class="btn" type="submit">Sign in</button>
                    <button class="btn secondary" type="button" id="signup">Create account</button>
                </div>

                <p class="small" style="margin-top:12px;color:inherit">By continuing you agree to our <a class="muted-link" href="#">Terms</a> and <a class="muted-link" href="#">Privacy Policy</a>.</p>
            </form>
        </section>
    </main>

    <script>
        // Small client-side behavior: validation, show/hide password, demo submit
        (function(){
            const form = document.getElementById('loginForm');
            const email = document.getElementById('email');
            const pwd = document.getElementById('password');
            const toggle = document.getElementById('togglePwd');
            const emailHelp = document.getElementById('emailHelp');
            const pwdHelp = document.getElementById('pwdHelp');

            function showHelper(el){ el.style.display='block'; }
            function hideHelper(el){ el.style.display='none'; }

            toggle.addEventListener('click', () => {
                const isPwd = pwd.type === 'password';
                pwd.type = isPwd ? 'text' : 'password';
                toggle.textContent = isPwd ? 'Hide' : 'Show';
                toggle.setAttribute('aria-pressed', String(isPwd));
                toggle.setAttribute('aria-label', isPwd ? 'Hide password' : 'Show password');
            });

            function validEmail(v){
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
            }

            email.addEventListener('input', () => {
                if (!email.value) { hideHelper(emailHelp); return; }
                validEmail(email.value) ? hideHelper(emailHelp) : showHelper(emailHelp);
            });

            pwd.addEventListener('input', () => {
                if (!pwd.value) { hideHelper(pwdHelp); return; }
                pwd.value.length >= 6 ? hideHelper(pwdHelp) : showHelper(pwdHelp);
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                let ok = true;
                if (!validEmail(email.value)) { showHelper(emailHelp); ok=false; }
                if (pwd.value.length < 6) { showHelper(pwdHelp); ok=false; }
                if (!ok) return;

                // Demo: replace with real submit logic
                const submitBtn = form.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Signing in...';

                setTimeout(() => {
                    // In a real app, handle redirect or token here
                    alert('Signed in (demo). Replace with real authentication flow.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign in';
                }, 900);
            });

            // lightweight link handlers (demo)
            document.getElementById('signup').addEventListener('click', () => {
                alert('Create account flow — replace with actual navigation.');
            });
            document.getElementById('forgot').addEventListener('click', (ev) => {
                ev.preventDefault();
                alert('Password reset flow — replace with actual navigation.');
            });
        })();
    </script>
</body>
</html>
